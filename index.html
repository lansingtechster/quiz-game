<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Animal Trivia Quiz</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .quiz-shell {
        width: min(100%, 760px);
        background: linear-gradient(180deg, #ffffff 0%, #e2efff 100%);
        border: 1px solid #cbd5e1;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }
      header {
        background: #2563eb;
        color: white;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      header h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 2.8rem);
        letter-spacing: 0.02em;
      }
      header p {
        margin: 0.75rem auto 0;
        max-width: 620px;
        font-size: 1rem;
        opacity: 0.9;
      }
      .quiz-content {
        padding: 1.75rem;
      }
      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .status {
        background: #e0f2fe;
        color: #0f172a;
        border-radius: 999px;
        padding: 0.65rem 1rem;
        font-weight: 600;
        font-size: 0.95rem;
      }
      .question-card {
        background: #ffffff;
        border-radius: 18px;
        padding: 1.5rem;
        border: 1px solid #cbd5e1;
      }
      .question-card h2 {
        margin: 0 0 0.75rem;
        font-size: 1.4rem;
      }
      .question-card p {
        margin: 0 0 1.4rem;
        color: #334155;
        line-height: 1.6;
      }
      .options {
        display: grid;
        gap: 0.9rem;
      }
      .option-button {
        border: 2px solid #94a3b8;
        background: white;
        color: #0f172a;
        border-radius: 14px;
        padding: 1rem 1rem;
        text-align: left;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        width: 80%;
      }
      .option-button:hover,
      .option-button:focus-visible {
        border-color: #2563eb;
        transform: translateY(-1px);
        outline: none;
      }
      .option-button.selected {
        background: #dbeafe;
        border-color: #2563eb;
      }
      .option-button.correct {
        background: #dcfce7;
        border-color: #16a34a;
        color: #0f172a;
      }
      .option-button.incorrect {
        background: #fee2e2;
        border-color: #ef4444;
        color: #0f172a;
      }
      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-top: 1.5rem;
        flex-wrap: wrap;
      }
      .controls button {
        border: none;
        border-radius: 999px;
        cursor: pointer;
        padding: 0.95rem 1.5rem;
        font-size: 1rem;
        font-weight: 700;
        transition: background 0.2s ease, transform 0.16s ease;
      }
      .controls button:hover {
        transform: translateY(-1px);
      }
      .check-btn {
        background: #2563eb;
        color: white;
      }
      .next-btn {
        background: #22c55e;
        color: white;
      }
      .restart-btn {
        background: #64748b;
        color: white;
      }
      .feedback {
        margin-top: 1rem;
        padding: 1rem 1.1rem;
        border-radius: 14px;
        background: #f8fafc;
        color: #334155;
        border: 1px solid #cbd5e1;
        min-height: 3rem;
      }
      .feedback strong {
        display: block;
        margin-bottom: 0.35rem;
      }
      .result-screen {
        text-align: center;
      }
      .result-screen h2 {
        margin: 0 0 0.75rem;
        font-size: 1.9rem;
      }
      .result-screen p {
        margin: 0.5rem auto 1.25rem;
        max-width: 680px;
        color: #334155;
        line-height: 1.6;
      }
      .result-score {
        font-size: 2.75rem;
        font-weight: 800;
        color: #0f172a;
      }
      .fun-fact {
        margin-top: 1rem;
        background: #eff6ff;
        border-radius: 16px;
        padding: 1rem;
        border: 1px solid #bfdbfe;
      }
      @media (max-width: 560px) {
        .quiz-shell {
          border-radius: 18px;
        }
        .controls {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="quiz-shell">
      <header>
        <h1>Animal Trivia Game</h1>
        <p>Test your animal knowledge with fun multiple-choice questions!</p>
      </header>

      <main class="quiz-content" id="quizContent">
        <div class="status-bar">
          <span class="status" id="questionCount">Question 1 of 5</span>
          <span class="status" id="scoreCount">Score: 0</span>
        </div>

        <section class="question-card" id="questionCard">
          <h2 id="questionTitle">Loading question...</h2>
          <p id="questionText"></p>
          <div class="options" id="options"></div>
          <div class="feedback" id="feedback">Choose an answer and press Check.</div>
        </section>

        <div class="controls">
          <button class="check-btn" id="checkButton">Check Answer</button>
          <button class="next-btn" id="nextButton" disabled>Next Question</button>
          <button class="restart-btn" id="restartButton">Restart Quiz</button>
        </div>
      </main>
    </div>

    <script>
      const quizData = [
        {
          question: 'Which animal is known as the fastest land animal?',
          options: ['Cheetah', 'Kangaroo', 'Eagle', 'Dolphin'],
          answer: 0,
          fact: 'Cheetahs can run up to 70 miles per hour for short distances.',
        },
        {
          question: 'What do koalas mostly eat?',
          options: ['Eucalyptus leaves', 'Bamboo', 'Grass', 'Fruit'],
          answer: 0,
          fact: 'Koalas spend most of their time sleeping after eating eucalyptus leaves.',
        },
        {
          question: 'Which animal uses echolocation to find food?',
          options: ['Bat', 'Elephant', 'Giraffe', 'Penguin'],
          answer: 0,
          fact: 'Bats make high-pitched sounds that bounce back, helping them see with sound.',
        },
        {
          question: 'A group of lions is called a what?',
          options: ['Pride', 'School', 'Herd', 'Pack'],
          answer: 0,
          fact: 'A pride of lions often includes sisters, brothers, and cubs living together.',
        },
        {
          question: 'Which animal can change the color of its skin to hide?',
          options: ['Chameleon', 'Cheetah', 'Dolphin', 'Kangaroo'],
          answer: 0,
          fact: 'Chameleons change color for camouflage, temperature, and mood.',
        },
      ];

      const questionTitle = document.getElementById('questionTitle');
      const questionText = document.getElementById('questionText');
      const optionsEl = document.getElementById('options');
      const feedbackEl = document.getElementById('feedback');
      const questionCountEl = document.getElementById('questionCount');
      const scoreCountEl = document.getElementById('scoreCount');
      const checkButton = document.getElementById('checkButton');
      const nextButton = document.getElementById('nextButton');
      const restartButton = document.getElementById('restartButton');
      const quizContent = document.getElementById('quizContent');

      let currentQuestion = 0;
      let selectedOption = null;
      let score = 0;
      let quizComplete = false;

      function startQuiz() {
        currentQuestion = 0;
        score = 0;
        selectedOption = null;
        quizComplete = false;
        updateStatus();
        loadQuestion();
        feedbackEl.textContent = 'Choose an answer and press Check.';
        nextButton.disabled = true;
        checkButton.disabled = false;
        quizContent.classList.remove('result-screen');
      }

      function updateStatus() {
        questionCountEl.textContent = quizComplete
          ? `Quiz complete!`
          : `Question ${currentQuestion + 1} of ${quizData.length}`;
        scoreCountEl.textContent = `Score: ${score}`;
      }

      function loadQuestion() {
        const question = quizData[currentQuestion];
        questionTitle.textContent = `Question ${currentQuestion + 1}`;
        questionText.textContent = question.question;
        optionsEl.innerHTML = '';

        question.options.forEach((optionText, optionIndex) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'option-button';
          button.textContent = optionText;
          button.dataset.index = optionIndex;
          button.addEventListener('click', () => selectOption(button, optionIndex));
          optionsEl.append(button);
        });
      }

      function selectOption(button, optionIndex) {
        if (checkButton.disabled) return;
        selectedOption = optionIndex;
        optionsEl.querySelectorAll('.option-button').forEach((btn) => {
          btn.classList.remove('selected');
        });
        button.classList.add('selected');
        feedbackEl.textContent = 'Now press Check Answer to see if you are right.';
      }

      function showResult() {
        const question = quizData[currentQuestion];
        const buttons = optionsEl.querySelectorAll('.option-button');
        buttons.forEach((button) => {
          const index = Number(button.dataset.index);
          button.disabled = true;
          button.classList.remove('selected');

          if (index === question.answer) {
            button.classList.add('correct');
          }
          if (selectedOption !== null && index === selectedOption && index !== question.answer) {
            button.classList.add('incorrect');
          }
        });

        if (selectedOption === null) {
          feedbackEl.innerHTML = '<strong>Oops!</strong> Please choose an answer before checking.';
          buttons.forEach((button) => (button.disabled = false));
          return;
        }

        if (selectedOption === question.answer) {
          score += 1;
          feedbackEl.innerHTML = `<strong>Great job!</strong> ${question.fact}`;
        } else {
          feedbackEl.innerHTML = `<strong>Nice try!</strong> The correct answer is <strong>${question.options[question.answer]}</strong>. ${question.fact}`;
        }

        updateStatus();
        checkButton.disabled = true;
        nextButton.disabled = false;
      }

      function nextQuestion() {
        currentQuestion += 1;
        selectedOption = null;
        if (currentQuestion >= quizData.length) {
          showFinalResults();
          return;
        }
        loadQuestion();
        feedbackEl.textContent = 'Choose an answer and press Check.';
        nextButton.disabled = true;
        checkButton.disabled = false;
      }

      function showFinalResults() {
        quizComplete = true;
        updateStatus();
        quizContent.innerHTML = `
          <div class="result-screen">
            <h2>🎉 You finished the quiz!</h2>
            <p class="result-score">${score} / ${quizData.length}</p>
            <p>Great work! You learned some fun facts about animals, from cheetahs and chameleons to koalas and bats.</p>
            <div class="fun-fact">
              <strong>Animal fact:</strong> The blue whale is the largest animal ever known, and its heart is about the size of a small car.
            </div>
          </div>
        `;
      }

      checkButton.addEventListener('click', showResult);
      nextButton.addEventListener('click', nextQuestion);
      restartButton.addEventListener('click', startQuiz);

      startQuiz();
    </script>
  </body>
</html>
